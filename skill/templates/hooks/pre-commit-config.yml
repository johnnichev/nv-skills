# Add this to your .pre-commit-config.yaml to enable UltraContext continuous sync
# Warns when code changes may make agent configs stale

repos:
  - repo: local
    hooks:
      - id: ultracontext-sync
        name: UltraContext Sync Check
        entry: .git/hooks/ultracontext-sync.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
